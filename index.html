<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気予報 PPTX 生成</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>天気予報 PPTX 生成</h1>
      <p class="subtitle">地点と期間を設定して、天気予報入りの PowerPoint を生成します。</p>
    </header>

    <section class="section">
      <h2>地点設定 <span class="hint">（最大5地点）</span></h2>

      <div id="search-area">
        <div class="search-row">
          <input type="text" id="search-input" placeholder="都市名を入力（例: 東京、大阪、Sapporo）" autocomplete="off">
          <button id="search-btn">検索</button>
        </div>
        <ul id="search-dropdown" class="dropdown" style="display:none"></ul>
      </div>

      <div id="location-list" class="location-list"></div>

      <button id="add-location-btn" class="secondary-btn">＋ 検索欄をクリア</button>
    </section>

    <section class="section">
      <h2>予報期間</h2>
      <div class="date-range-row">
        <div class="date-input-group">
          <label for="start-date">開始日</label>
          <input type="date" id="start-date">
        </div>
        <span class="date-sep">〜</span>
        <div class="date-input-group">
          <label for="end-date">終了日</label>
          <input type="date" id="end-date">
        </div>
        <span id="days-badge" class="days-badge">14日間</span>
      </div>
      <div id="date-error" class="date-error" style="display:none"></div>
    </section>

    <section class="section generate-section">
      <button id="generate-btn" class="primary-btn">PPTX を生成してダウンロード</button>
      <div id="status-msg" class="status-msg" style="display:none"></div>
    </section>

    <footer>
      <p>データ出典: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> (CC BY 4.0)</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="app.js"></script>
</body>
</html>
